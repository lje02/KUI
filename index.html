<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KUI 节点管理面板</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 text-gray-800">
    <div id="app" class="max-w-3xl mx-auto mt-10">
        
        <div v-if="!isLoggedIn" class="bg-white p-8 rounded shadow max-w-sm mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-center">KUI 安全登录</h2>
            <input v-model="password" type="password" placeholder="请输入管理密码" @keyup.enter="login" class="w-full border p-3 rounded mb-4 focus:outline-blue-500">
            <button @click="login" class="w-full bg-black text-white p-3 rounded hover:bg-gray-800 transition">进入控制台</button>
        </div>

        <div v-else class="bg-white p-8 rounded shadow border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">KUI 节点管理面板 (Pages 版)</h1>
                <button @click="logout" class="text-sm text-gray-500 hover:text-black">退出登录</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-gray-50 p-4 rounded border">
                <input v-model="form.name" placeholder="节点名称 (如: SG-01)" class="w-full border p-2 rounded">
                <input v-model="form.vps_ip" placeholder="VPS 公网 IP" class="w-full border p-2 rounded">
                <select v-model="form.protocol" class="w-full border p-2 rounded">
                    <option value="VLESS">VLESS (推荐)</option>
                    <option value="Reality">Reality</option>
                    <option value="Hysteria2">Hysteria 2</option>
                </select>
                <input v-model="form.port" type="number" placeholder="监听端口 (默认 443)" class="w-full border p-2 rounded">
                <button @click="save" class="md:col-span-2 bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition font-medium">添加并生成命令</button>
            </div>
            
            <hr class="my-6 border-gray-200">
            
            <ul class="space-y-4">
                <li v-if="nodes.length === 0" class="text-center text-gray-400 py-4">暂无节点数据，请在上方添加</li>
                <li v-for="(node, i) in nodes" :key="i" class="border rounded p-4 shadow-sm hover:shadow transition bg-white">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="font-bold text-lg text-blue-600">{{node.name}}</span> 
                            <span class="text-gray-600 ml-2">{{node.vps_ip}}</span>
                            <span class="inline-block bg-gray-100 px-2 py-1 rounded text-xs ml-2 font-mono">{{node.protocol}} : {{node.port}}</span>
                        </div>
                        <button @click="del(i)" class="text-red-500 hover:text-red-700 text-sm">删除节点</button>
                    </div>
                    
                    <div class="bg-gray-900 text-green-400 p-3 rounded font-mono text-sm relative group overflow-x-auto">
                        <code>{{ generateCommand(node.vps_ip) }}</code>
                        <button @click="copyCommand(generateCommand(node.vps_ip))" class="absolute right-2 top-2 bg-white text-black px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition">
                            复制
                        </button>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const isLoggedIn = ref(false);
                const password = ref('');
                const token = ref(localStorage.getItem('kui_token') || '');
                const nodes = ref([]);
                const form = ref({ name: '', vps_ip: '', protocol: 'VLESS', port: 443 });
                
                // 获取当前页面的域名，用于生成对接命令
                const currentDomain = window.location.origin;

                const checkAuth = () => {
                    if (token.value) {
                        isLoggedIn.value = true;
                        load();
                    }
                };

                const login = async () => {
                    if (!password.value) return;
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        body: JSON.stringify({ password: password.value }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    if (res.ok) {
                        token.value = password.value;
                        localStorage.setItem('kui_token', token.value);
                        isLoggedIn.value = true;
                        load();
                    } else {
                        alert('密码错误！');
                    }
                };

                const logout = () => {
                    localStorage.removeItem('kui_token');
                    isLoggedIn.value = false;
                    token.value = '';
                    password.value = '';
                };

                // 统一的请求方法，带上鉴权 Token
                const fetchApi = async (url, options = {}) => {
                    options.headers = { ...options.headers, 'Authorization': token.value };
                    const res = await fetch(url, options);
                    if (res.status === 401) {
                        logout();
                        alert('登录已失效，请重新登录');
                        throw new Error('Unauthorized');
                    }
                    return res;
                };

                const load = async () => {
                    try {
                        const res = await fetchApi('/api/list');
                        nodes.value = await res.json();
                    } catch (e) {}
                };
                
                const save = async () => {
                    if(!form.value.name || !form.value.vps_ip) return alert("请填写完整信息");
                    await fetchApi('/api/add', { 
                        method: 'POST', 
                        body: JSON.stringify({...form.value, uuid: crypto.randomUUID()}) 
                    });
                    form.value = { name: '', vps_ip: '', protocol: 'VLESS', port: 443 };
                    load();
                };
                
                const del = async (i) => {
                    if(confirm('确定删除该节点吗？')) {
                        await fetchApi('/api/del?index=' + i, { method: 'DELETE' });
                        load();
                    }
                };

                // 生成一键安装命令
                const generateCommand = (ip) => {
                    // 这里默认你将来的脚本会放在 xiaok/KUI 仓库里
                    return \`bash <(curl -sL https://raw.githubusercontent.com/xiaok/KUI/main/vps/kui.sh) --api "\${currentDomain}" --ip "\${ip}"\`;
                };

                const copyCommand = (text) => {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('命令已复制，请在 VPS 终端粘贴运行');
                    });
                };
                
                onMounted(checkAuth);
                return { isLoggedIn, password, login, logout, nodes, form, save, del, generateCommand, copyCommand };
            }
        }).mount('#app');
    </script>
</body>
</html>
